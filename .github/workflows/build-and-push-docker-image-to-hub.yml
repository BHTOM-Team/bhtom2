name: Build and Push Docker Image to hub.astrolabs.pl (branch bhtom2-test)

on:
  push:
    branches:
      - bhtom2-test

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Harbor
        uses: docker/login-action@v2
        with:
          registry: https://hub.astrolabs.pl
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract version from date
        id: version
        run: |
          VERSION=$(date +"%Y%m%d%H%M%S")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and tag Docker image
        run: docker build -f docker/test/test_Dockerfile -t hub.astrolabs.pl/bh-tom2-test/bh-tom2-test:${{ env.VERSION }} .

      - name: Tag Docker image as latest
        run: docker tag hub.astrolabs.pl/bh-tom2-test/bh-tom2-test:${{ env.VERSION }} hub.astrolabs.pl/bh-tom2-test/bh-tom2-test:latest

      - name: Push versioned Docker image
        run: docker push hub.astrolabs.pl/bh-tom2-test/bh-tom2-test:${{ env.VERSION }}

      - name: Push latest Docker image
        run: docker push hub.astrolabs.pl/bh-tom2-test/bh-tom2-test:latest

  deploy-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check deploy secrets
        id: deploy_check
        env:
          TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST }}
          TEST_SERVER_USER: ${{ secrets.TEST_SERVER_USER }}
          TEST_SERVER_SSH_KEY: ${{ secrets.TEST_SERVER_SSH_KEY }}
          TEST_COMPOSE_PATH: ${{ secrets.TEST_COMPOSE_PATH }}
          TEST_COMPOSE_FILE: ${{ secrets.TEST_COMPOSE_FILE }}
          TEST_COMPOSE_SERVICE: ${{ secrets.TEST_COMPOSE_SERVICE }}
        run: |
          if [ -n "$TEST_SERVER_HOST" ] && [ -n "$TEST_SERVER_USER" ] && [ -n "$TEST_SERVER_SSH_KEY" ] && [ -n "$TEST_COMPOSE_PATH" ] && [ -n "$TEST_COMPOSE_FILE" ] && [ -n "$TEST_COMPOSE_SERVICE" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped: required deploy secrets are missing."
          fi

      - name: Deploy on test server (pull + restart)
        if: steps.deploy_check.outputs.enabled == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.TEST_COMPOSE_PATH }}
            docker compose -f ${{ secrets.TEST_COMPOSE_FILE }} pull ${{ secrets.TEST_COMPOSE_SERVICE }}
            docker compose -f ${{ secrets.TEST_COMPOSE_FILE }} up -d ${{ secrets.TEST_COMPOSE_SERVICE }}
